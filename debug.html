<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MDA Diagnóstico</title>
<style>
  body{font-family:monospace;background:#1a1a2e;color:#e0e0e0;padding:20px;margin:0}
  h2{color:#ff6b00}
  .step{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;margin:10px 0}
  .ok{color:#3fb950}.err{color:#f85149}.warn{color:#d29922}.info{color:#58a6ff}
  pre{margin:4px 0;white-space:pre-wrap;word-break:break-all;font-size:12px}
  button{background:#238636;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:14px;margin:4px}
  button.sec{background:#21262d;border:1px solid #30363d}
  #results{margin-top:20px}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold}
  .badge.ok{background:#1a3a1a;color:#3fb950;border:1px solid #238636}
  .badge.err{background:#3a1a1a;color:#f85149;border:1px solid #da3633}
</style>
</head>
<body>
<h2>&#128295; MDA — Panel de Diagnóstico</h2>
<p style="color:#888">Ejecuta cada paso en orden para identificar dónde falla el upload.</p>

<div class="step">
  <strong>Configuración detectada</strong>
  <pre id="cfg">Cargando...</pre>
</div>

<div style="display:flex;gap:8px;flex-wrap:wrap;margin:16px 0">
  <button onclick="runAll()">&#9654; Ejecutar diagnóstico completo</button>
  <button class="sec" onclick="testPing()">1. Ping Worker</button>
  <button class="sec" onclick="testAuth()">2. Verificar auth</button>
  <button class="sec" onclick="testUpload()">3. Upload prueba</button>
  <button class="sec" onclick="testList()">4. Ver lista SOPs</button>
</div>

<div id="results"></div>

<script>
var WORKER = localStorage.getItem('mda_worker_url') || '';
var SESSION = localStorage.getItem('mda_session') || '';

// Mostrar config
document.getElementById('cfg').innerHTML =
  'Worker URL : ' + (WORKER || '<span class="err">⚠ VACÍO — necesitas iniciar sesión</span>') + '\n' +
  'Session    : ' + (SESSION ? SESSION.slice(0,8)+'...' : '<span class="err">⚠ VACÍO — necesitas iniciar sesión</span>') + '\n' +
  'Página     : ' + window.location.href;

function log(html) {
  document.getElementById('results').innerHTML += html;
}

function step(title, content, status) {
  var cls = status === 'ok' ? 'ok' : status === 'err' ? 'err' : 'info';
  var badge = status === 'ok' ? '<span class="badge ok">✓ OK</span>' :
              status === 'err' ? '<span class="badge err">✗ Error</span>' : '';
  log('<div class="step"><strong>' + title + '</strong> ' + badge +
      '<pre class="' + cls + '">' + content + '</pre></div>');
}

function apiFetch(method, path, body) {
  var opts = {
    method: method,
    headers: { 'Authorization': 'Bearer ' + SESSION }
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(WORKER + path, opts)
    .then(function(r) {
      var status = r.status;
      return r.text().then(function(text) {
        var json = null;
        try { json = JSON.parse(text); } catch(e) {}
        return { status: status, ok: r.ok, text: text, json: json };
      });
    });
}

function testPing() {
  if (!WORKER) { step('1. Ping Worker', 'Worker URL vacía. Debes iniciar sesión primero.', 'err'); return; }
  step('1. Ping Worker', 'Conectando a ' + WORKER + '/ping ...', 'info');
  apiFetch('GET', '/ping').then(function(r) {
    step('1. Ping Worker',
      'HTTP ' + r.status + '\n' + JSON.stringify(r.json, null, 2),
      r.ok ? 'ok' : 'err');
  }).catch(function(e) {
    step('1. Ping Worker', 'Error de red: ' + e.message, 'err');
  });
}

function testAuth() {
  if (!SESSION) { step('2. Auth', 'Session vacía. Debes iniciar sesión primero.', 'err'); return; }
  apiFetch('GET', '/auth/me').then(function(r) {
    var info = JSON.stringify(r.json, null, 2);
    var ok = r.json && r.json.authenticated && r.json.role === 'admin';
    step('2. Verificar autenticación',
      'HTTP ' + r.status + '\n' + info +
      (r.json && r.json.role !== 'admin' ? '\n⚠ Rol es "' + r.json.role + '", no "admin"' : ''),
      ok ? 'ok' : 'err');
  }).catch(function(e) {
    step('2. Auth', 'Error: ' + e.message, 'err');
  });
}

function testUpload() {
  var TEST_HTML = '<html><head><title>DIAG-001</title></head><body>' +
    '<span class="sop-id">DIAG-001</span>' +
    '<div class="container"><h1>Diagnóstico</h1></div></body></html>';
  var TEST_META = {
    sopId: 'DIAG-001', titulo: 'Diagnóstico de Upload', dom: 'APP',
    faenas: 'MVE,MBL,STG,VAN', criticidad: 'MEDIO', nivel: 'Nivel 1', grupo: 'IT'
  };
  step('3. Upload de prueba', 'Enviando DIAG-001 al Worker... (' + TEST_HTML.length + ' bytes)', 'info');
  apiFetch('POST', '/sop/upload', { html: TEST_HTML, meta: TEST_META })
    .then(function(r) {
      step('3. Upload de prueba',
        'HTTP ' + r.status + '\n' + JSON.stringify(r.json, null, 2),
        r.ok && r.json && r.json.ok ? 'ok' : 'err');
      if (r.ok && r.json && r.json.ok) {
        document.getElementById('results').innerHTML +=
          '<div class="step"><strong>&#128279; Ver SOP subido</strong><br>' +
          '<a href="viewer.html?sop=DIAG-001" target="_blank" style="color:#58a6ff">Abrir DIAG-001 en el viewer &#8594;</a></div>';
      }
    }).catch(function(e) {
      step('3. Upload', 'Error: ' + e.message, 'err');
    });
}

function testList() {
  apiFetch('GET', '/sop/list').then(function(r) {
    var sops = r.json && r.json.sops ? r.json.sops : [];
    step('4. Lista de SOPs custom',
      'HTTP ' + r.status + ' — ' + sops.length + ' SOPs\n' +
      sops.map(function(s) { return '• ' + s.sopId + ' | ' + s.dom + ' | ' + s.titulo; }).join('\n'),
      r.ok ? 'ok' : 'err');
  }).catch(function(e) {
    step('4. Lista', 'Error: ' + e.message, 'err');
  });
}

async function runAll() {
  document.getElementById('results').innerHTML = '';
  testPing();
  await new Promise(r => setTimeout(r, 800));
  testAuth();
  await new Promise(r => setTimeout(r, 800));
  testUpload();
  await new Promise(r => setTimeout(r, 1200));
  testList();
}
</script>
</body>
</html>

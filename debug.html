<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>MDA Debug v2</title>
<style>
body{font-family:monospace;background:#1a1a2e;color:#e0e0e0;padding:20px}
h2{color:#ff6b00}
.box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;margin:10px 0}
.ok{color:#3fb950}.err{color:#f85149}.info{color:#58a6ff}
pre{margin:4px 0;white-space:pre-wrap;font-size:12px}
button{background:#238636;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:14px;margin:4px}
</style></head>
<body>
<h2>&#128295; MDA Debug v2</h2>
<div class="box">
  <strong>Config</strong>
  <pre id="cfg"></pre>
</div>
<button onclick="runAll()">&#9654; Ejecutar todo</button>
<button onclick="clearKV()" style="background:#da3633">&#128465; Borrar SOP de prueba</button>
<button onclick="testPromptCaching()" style="background:#7b2d8b">&#129520; Test Prompt Caching</button>
<button onclick="checkKeywords()" style="background:#1d6f42">&#128269; Ver proc_keywords</button>
<div id="out"></div>
<script>
var W = localStorage.getItem('mda_worker_url') || '';
var S = localStorage.getItem('mda_session') || '';
document.getElementById('cfg').textContent =
  'Worker : ' + (W||'VACÍO') + '\nSession: ' + (S ? S.slice(0,12)+'...' : 'VACÍO');

function log(html){ document.getElementById('out').innerHTML += html; }
function box(title, txt, cls){
  log('<div class="box"><b>'+title+'</b><pre class="'+(cls||'info')+'">'+txt+'</pre></div>');
}

function go(method, path, body){
  return fetch(W+path,{
    method:method,
    headers:Object.assign({'Authorization':'Bearer '+S}, body?{'Content-Type':'application/json'}:{}),
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){
    var s=r.status, ok=r.ok;
    return r.text().then(function(t){
      var j=null; try{j=JSON.parse(t);}catch(e){}
      return {status:s, ok:ok, json:j, text:t};
    });
  });
}

async function runAll(){
  document.getElementById('out').innerHTML='';

  // 1. Ping
  var r = await go('GET','/ping');
  box('1. Ping '+W, JSON.stringify(r.json,null,2), r.ok?'ok':'err');

  // 2. Auth
  r = await go('GET','/auth/me');
  box('2. Auth', JSON.stringify(r.json,null,2), r.ok&&r.json&&r.json.authenticated?'ok':'err');

  // 3. Upload con ID formato SOP-TST-001 (3 grupos: letras-letras-números)
  var html3 = '<html><body><span class="sop-id">SOP-TST-001</span><div class="container"><h1>Test</h1></div></body></html>';
  var meta3 = {sopId:'SOP-TST-001',titulo:'Test Upload',dom:'APP',faenas:'MVE,MBL,STG,VAN',criticidad:'MEDIO',nivel:'Nivel 1',grupo:''};
  r = await go('POST','/sop/upload',{html:html3,meta:meta3});
  box('3. Upload SOP-TST-001', 'HTTP '+r.status+'\n'+JSON.stringify(r.json,null,2), r.ok&&r.json&&r.json.ok?'ok':'err');

  // 4. Lista post-upload
  await new Promise(res=>setTimeout(res,500));
  r = await go('GET','/sop/list');
  var sops = r.json&&r.json.sops ? r.json.sops : [];
  box('4. /sop/list después del upload',
    'HTTP '+r.status+' — '+sops.length+' SOPs\n'+
    sops.map(function(s){return '  • '+s.sopId+' | '+s.dom+' | faenas:'+s.faenas;}).join('\n'),
    r.ok?'ok':'err');

  // 5. Leer el SOP guardado directamente
  r = await go('GET','/sop/SOP-TST-001');
  box('5. GET /sop/SOP-TST-001 (verificar KV)',
    'HTTP '+r.status+'\n'+
    (r.json ? 'hasEdit:'+r.json.hasEdit+'  htmlLen:'+(r.json.html||'').length : r.text.slice(0,200)),
    r.ok?'ok':'err');

  // 6. Resumen
  var ok3 = document.querySelector('.ok');
  var err3 = document.querySelector('.err');
  log('<div class="box" style="border-color:'+(err3?'#f85149':'#3fb950')+'">'+
    '<b>RESULTADO</b><pre class="'+(err3?'err':'ok')+'">' +
    (err3 ? 'Hay errores - ve los pasos marcados en rojo' : '✅ Todo OK - el Worker funciona correctamente') +
    '</pre></div>');
}

async function testPromptCaching() {
  document.getElementById('out').innerHTML = '';

  // PASO 1: Verificar que el modelo responde (sin caching)
  // Sin pasar modelo → el Worker usa su AI_MODEL configurado
  box('Paso 1 — Testeando modelo configurado en el Worker', 'Probando...', 'info');
  var rm1 = await go('POST', '/debug/anthropic', {});
  var modelUsed = rm1.json && rm1.json.modelUsed || 'desconocido';
  box('Paso 1 — Modelo: ' + modelUsed,
    'HTTP ' + rm1.status + '\n' + JSON.stringify(rm1.json, null, 2),
    rm1.ok && rm1.json && rm1.json.ok ? 'ok' : 'err');

  if(!rm1.ok || !(rm1.json && rm1.json.ok)) {
    var errMsg = rm1.json && rm1.json.error || 'Error desconocido';
    box('❌ PROBLEMA CON EL MODELO',
      'Modelo: ' + modelUsed + '\nError: ' + errMsg + '\n\nPosibles causas:\n' +
      '• ANTHROPIC_API_KEY no configurada en el Worker (Settings → Variables)\n' +
      '• El modelo "' + modelUsed + '" no está disponible en tu plan API',
      'err');
    return;
  }

  // PASO 2: Test de caching (solo si el modelo funciona)
  box('Paso 2 — Test Prompt Caching (2 llamadas)', 'Enviando...', 'info');
  var SYS = 'Eres el asistente MDA de Capstone Copper Chile. Responde siempre en español.';
  var MSG = [{role:'user', content:'¿Qué es un SOP?'}];

  var t1=Date.now(), r1=await go('POST','/chat',{system:SYS,messages:MSG}), ms1=Date.now()-t1;
  await new Promise(res=>setTimeout(res,600));
  var t2=Date.now(), r2=await go('POST','/chat',{system:SYS,messages:MSG}), ms2=Date.now()-t2;

  var cr = r2.json&&r2.json.tokens&&r2.json.tokens.cacheRead||0;
  var cw = r1.json&&r1.json.tokens&&r1.json.tokens.cacheWrite||0;

  box('Llamada 1 | Llamada 2',
    'Call 1: HTTP ' + r1.status + ' ' + ms1 + 'ms | cache_write=' + cw + '\n' +
    'Call 2: HTTP ' + r2.status + ' ' + ms2 + 'ms | cache_read='  + cr + '\n' +
    'Respuesta: ' + ((r2.json&&r2.json.response||r2.json&&r2.json.error||'').slice(0,100)),
    cr>0 ? 'ok' : (r1.ok ? 'warn' : 'err'));

  box(cr>0 ? '✅ PROMPT CACHING ACTIVO' : (r1.ok ? '⚠️ Chat OK pero sin caché aún' : '❌ Chat con error'),
    cr>0
      ? 'Ahorro: ~' + Math.round(cr*0.9) + ' tokens (90% desc.) | Call1=' + ms1 + 'ms Call2=' + ms2 + 'ms'
      : r1.ok
        ? 'El chat funciona. El caché puede activarse si el sistema prompt supera los 2048 tokens (mínimo Haiku).'
        : 'Error: ' + (r1.json&&r1.json.error||'revisar Worker'),
    cr>0 ? 'ok' : (r1.ok ? 'info' : 'err'));
}

async function checkKeywords() {
  document.getElementById('out').innerHTML = '';
  var r = await go('GET', '/proc/keywords');
  var kw = r.json && r.json.keywords ? r.json.keywords : {};
  var sops = Object.keys(kw);
  var total = sops.reduce(function(acc, s){ return acc + (kw[s]||'').split(' ').length; }, 0);
  box('proc_keywords en KV',
    'SOPs indexados: ' + sops.length + '\n' +
    'Total palabras: ' + total + '\n' +
    'Tokens estimados: ~' + Math.round(total/0.75) + '\n\n' +
    (sops.length > 0
      ? sops.map(function(s){ return '• ' + s + ': ' + (kw[s]||'').split(' ').length + ' palabras'; }).join('\n')
      : '⚠️ KV vacío — necesitas indexar desde Admin → Conocimiento → ⚙️ Indexar todo'),
    sops.length > 0 ? 'ok' : 'err');

  if(sops.length > 0) {
    var sys_est  = 400;
    var cat_est  = 1200;
    var kw_est   = Math.round(total/0.75);
    var total_est = sys_est + cat_est + kw_est;
    box(total_est >= 2048 ? '✅ Umbral de caching superado' : '⚠️ Aún bajo el umbral',
      'System prompt:  ~' + sys_est  + ' tokens\n' +
      'Catálogo SOPs:  ~' + cat_est  + ' tokens\n' +
      'Keywords KV:    ~' + kw_est   + ' tokens\n' +
      '─────────────────────────\n' +
      'TOTAL estimado: ~' + total_est + ' tokens\n' +
      'Mínimo Haiku:    2048 tokens\n' +
      (total_est >= 2048
        ? '→ El caching debería activarse en el próximo deploy.'
        : '→ Faltan ~' + (2048 - total_est) + ' tokens. Corre "Indexar todo" o agrega entradas en la Base de Conocimiento.'),
      total_est >= 2048 ? 'ok' : 'warn');
  }
}

async function clearKV(){
  var r = await go('DELETE','/sop/SOP-TST-001');
  box('DELETE SOP-TST-001', JSON.stringify(r.json,null,2), r.ok?'ok':'err');
  r = await go('GET','/sop/list');
  box('Lista tras borrar', (r.json&&r.json.sops?r.json.sops.length:0)+' SOPs', 'info');
}
</script>
</body></html>

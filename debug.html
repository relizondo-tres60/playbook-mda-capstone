<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>MDA Debug v2</title>
<style>
body{font-family:monospace;background:#1a1a2e;color:#e0e0e0;padding:20px}
h2{color:#ff6b00}
.box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;margin:10px 0}
.ok{color:#3fb950}.err{color:#f85149}.info{color:#58a6ff}
pre{margin:4px 0;white-space:pre-wrap;font-size:12px}
button{background:#238636;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:14px;margin:4px}
</style></head>
<body>
<h2>&#128295; MDA Debug v2</h2>
<div class="box">
  <strong>Config</strong>
  <pre id="cfg"></pre>
</div>
<button onclick="runAll()">&#9654; Ejecutar todo</button>
<button onclick="clearKV()" style="background:#da3633">&#128465; Borrar SOP de prueba</button>
<button onclick="testPromptCaching()" style="background:#7b2d8b">&#129520; Test Prompt Caching</button>
<div id="out"></div>
<script>
var W = localStorage.getItem('mda_worker_url') || '';
var S = localStorage.getItem('mda_session') || '';
document.getElementById('cfg').textContent =
  'Worker : ' + (W||'VAC├ŹO') + '\nSession: ' + (S ? S.slice(0,12)+'...' : 'VAC├ŹO');

function log(html){ document.getElementById('out').innerHTML += html; }
function box(title, txt, cls){
  log('<div class="box"><b>'+title+'</b><pre class="'+(cls||'info')+'">'+txt+'</pre></div>');
}

function go(method, path, body){
  return fetch(W+path,{
    method:method,
    headers:Object.assign({'Authorization':'Bearer '+S}, body?{'Content-Type':'application/json'}:{}),
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){
    var s=r.status, ok=r.ok;
    return r.text().then(function(t){
      var j=null; try{j=JSON.parse(t);}catch(e){}
      return {status:s, ok:ok, json:j, text:t};
    });
  });
}

async function runAll(){
  document.getElementById('out').innerHTML='';

  // 1. Ping
  var r = await go('GET','/ping');
  box('1. Ping '+W, JSON.stringify(r.json,null,2), r.ok?'ok':'err');

  // 2. Auth
  r = await go('GET','/auth/me');
  box('2. Auth', JSON.stringify(r.json,null,2), r.ok&&r.json&&r.json.authenticated?'ok':'err');

  // 3. Upload con ID formato SOP-TST-001 (3 grupos: letras-letras-n├║meros)
  var html3 = '<html><body><span class="sop-id">SOP-TST-001</span><div class="container"><h1>Test</h1></div></body></html>';
  var meta3 = {sopId:'SOP-TST-001',titulo:'Test Upload',dom:'APP',faenas:'MVE,MBL,STG,VAN',criticidad:'MEDIO',nivel:'Nivel 1',grupo:''};
  r = await go('POST','/sop/upload',{html:html3,meta:meta3});
  box('3. Upload SOP-TST-001', 'HTTP '+r.status+'\n'+JSON.stringify(r.json,null,2), r.ok&&r.json&&r.json.ok?'ok':'err');

  // 4. Lista post-upload
  await new Promise(res=>setTimeout(res,500));
  r = await go('GET','/sop/list');
  var sops = r.json&&r.json.sops ? r.json.sops : [];
  box('4. /sop/list despu├ęs del upload',
    'HTTP '+r.status+' ÔÇö '+sops.length+' SOPs\n'+
    sops.map(function(s){return '  ÔÇó '+s.sopId+' | '+s.dom+' | faenas:'+s.faenas;}).join('\n'),
    r.ok?'ok':'err');

  // 5. Leer el SOP guardado directamente
  r = await go('GET','/sop/SOP-TST-001');
  box('5. GET /sop/SOP-TST-001 (verificar KV)',
    'HTTP '+r.status+'\n'+
    (r.json ? 'hasEdit:'+r.json.hasEdit+'  htmlLen:'+(r.json.html||'').length : r.text.slice(0,200)),
    r.ok?'ok':'err');

  // 6. Resumen
  var ok3 = document.querySelector('.ok');
  var err3 = document.querySelector('.err');
  log('<div class="box" style="border-color:'+(err3?'#f85149':'#3fb950')+'">'+
    '<b>RESULTADO</b><pre class="'+(err3?'err':'ok')+'">' +
    (err3 ? 'Hay errores - ve los pasos marcados en rojo' : 'Ôťů Todo OK - el Worker funciona correctamente') +
    '</pre></div>');
}

async function testPromptCaching() {
  document.getElementById('out').innerHTML = '';
  box('Test Prompt Caching', 'Enviando 2 llamadas consecutivas al chat...', 'info');

  var SYSTEM = 'Eres el asistente MDA de Capstone Copper Chile. Responde en espa├▒ol.';
  var MSG    = [{ role:'user', content:'┬┐Qu├ę es un SOP?' }];

  // Llamada 1 ÔÇö deber├şa CREAR el cach├ę (cacheWrite > 0)
  var t1 = Date.now();
  var r1 = await go('POST', '/chat', { system: SYSTEM, messages: MSG });
  var ms1 = Date.now() - t1;

  if(!r1.ok) {
    box('Llamada 1 ÔÇö ERROR',
      'HTTP ' + r1.status + ' (' + ms1 + 'ms)\n' +
      'Error         : ' + (r1.json&&r1.json.error||'desconocido') + '\n' +
      'Tipo          : ' + (r1.json&&r1.json.errorType||'') + '\n' +
      'Modelo        : ' + (r1.json&&r1.json.model||'') + '\n' +
      'Raw           : ' + (r1.json&&r1.json.raw||''), 'err');
    return;
  }
  box('Llamada 1 ÔÇö Creaci├│n de cach├ę',
    'HTTP ' + r1.status + ' (' + ms1 + 'ms)\n' +
    'cached        : ' + (r1.json&&r1.json.cached) + '\n' +
    'input_tokens  : ' + (r1.json&&r1.json.tokens&&r1.json.tokens.in) + '\n' +
    'cache_write   : ' + (r1.json&&r1.json.tokens&&r1.json.tokens.cacheWrite||0) + ' tokens\n' +
    'cache_read    : ' + (r1.json&&r1.json.tokens&&r1.json.tokens.cacheRead||0) + '\n' +
    'Respuesta     : ' + ((r1.json&&r1.json.response||'').slice(0,80)+'...'),
    'info');

  // Esperar 500ms y enviar la misma llamada
  await new Promise(res => setTimeout(res, 500));

  // Llamada 2 ÔÇö deber├şa LEER desde cach├ę (cacheRead > 0, cached: true)
  var t2 = Date.now();
  var r2 = await go('POST', '/chat', { system: SYSTEM, messages: MSG });
  var ms2 = Date.now() - t2;

  var cacheRead  = r2.json&&r2.json.tokens&&r2.json.tokens.cacheRead  || 0;
  var cacheWrite = r2.json&&r2.json.tokens&&r2.json.tokens.cacheWrite || 0;
  var isCached   = r2.json&&r2.json.cached;
  var status     = cacheRead > 0 ? 'ok' : 'err';

  box('Llamada 2 ÔÇö Lectura desde cach├ę',
    'HTTP ' + r2.status + ' (' + ms2 + 'ms)\n' +
    'cached        : ' + isCached + '\n' +
    'input_tokens  : ' + (r2.json&&r2.json.tokens&&r2.json.tokens.in) + '\n' +
    'cache_write   : ' + cacheWrite + '\n' +
    'cache_read    : ' + cacheRead + ' tokens ÔćÉ debe ser > 0 si el cach├ę funciona\n' +
    'Respuesta     : ' + ((r2.json&&r2.json.response||'').slice(0,80)+'...'),
    status);

  // Veredicto
  if(cacheRead > 0) {
    var savings = Math.round(cacheRead * 0.9); // 90% cheaper
    box('Ôťů PROMPT CACHING ACTIVO',
      'El cach├ę est├í funcionando correctamente.\n' +
      'En esta llamada se ahorraron ~' + savings + ' tokens (90% desc. en ' + cacheRead + ' tokens cacheados).\n' +
      'Velocidad: Llamada 1=' + ms1 + 'ms  Llamada 2=' + ms2 + 'ms',
      'ok');
  } else {
    box('ÔŁî CACH├ë NO ACTIVO',
      'cache_read = 0 en la 2┬¬ llamada.\nPosibles causas:\n' +
      'ÔÇó El Worker a├║n no fue desplegado con los cambios\n' +
      'ÔÇó El bloque cacheado tiene menos de 1024 tokens (m├şnimo requerido)\n' +
      'ÔÇó La API key no tiene acceso a Prompt Caching',
      'err');
  }
}

async function clearKV(){
  var r = await go('DELETE','/sop/SOP-TST-001');
  box('DELETE SOP-TST-001', JSON.stringify(r.json,null,2), r.ok?'ok':'err');
  r = await go('GET','/sop/list');
  box('Lista tras borrar', (r.json&&r.json.sops?r.json.sops.length:0)+' SOPs', 'info');
}
</script>
</body></html>

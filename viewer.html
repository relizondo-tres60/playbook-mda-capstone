<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cargando procedimiento — MDA Playbook</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e}
/* Loading state */
#viewer-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:#888}
.spinner{width:40px;height:40px;border:4px solid #eef1f7;border-top-color:#0057a8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Error state */
#viewer-error{display:none;max-width:500px;margin:60px auto;background:#fff;border-radius:12px;padding:32px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08)}
#viewer-error .ei{font-size:48px;margin-bottom:14px}
#viewer-error h2{color:#c0392b;margin-bottom:10px}
#viewer-error p{color:#555;font-size:14px;line-height:1.6}
#viewer-error a{color:#0057a8;font-weight:600;text-decoration:none}
/* SOP content container */
#sop-content{display:none}
</style>
<!-- Override: +25% ancho del contenido del SOP -->
<style>
  /* Ampliar el contenedor principal del SOP */
  #sop-content .container {
    max-width: 1375px !important;
  }
  /* Pantallas intermedias: ajustar el breakpoint */
  @media(max-width:1128px){
    #sop-content .container {
      grid-template-columns: 1fr !important;
    }
  }
</style>
</head>
<body>

<!-- Estado de carga -->
<div id="viewer-loading">
  <div class="spinner"></div>
  <div id="viewer-loading-msg">Autenticando...</div>
</div>

<!-- Estado de error -->
<div id="viewer-error">
  <div class="ei">⚠️</div>
  <h2 id="err-title">Error</h2>
  <p id="err-body"></p>
</div>

<!-- Contenido del SOP (se inyecta aquí) -->
<div id="sop-content"></div>

<script>
// ── Obtener el SOP ID de la URL ───────────────────────────────────────────────
var params = new URLSearchParams(window.location.search);
var TARGET_SOP = params.get('sop') || params.get('id') || '';

function showError(title, body) {
  document.getElementById('viewer-loading').style.display = 'none';
  document.getElementById('viewer-error').style.display  = 'block';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-body').innerHTML   = body;
}

function setLoadingMsg(msg) {
  var el = document.getElementById('viewer-loading-msg');
  if (el) el.textContent = msg;
}

if (!TARGET_SOP) {
  showError('SOP no especificado',
    'No se indicó un ID de procedimiento en la URL.<br><br>' +
    '<a href="Catalogo_Servicios_MDA_Capstone.html">← Ir al Catálogo</a>');
}

// ── Esta función se llama UNA VEZ cuando PlaybookAuth termina su auth ─────────
function onAuthReady(user) {
  var A = window.PlaybookAuth;
  if (!A || !A.workerUrl) {
    showError('Worker no configurado',
      'La URL del Worker no está disponible. ' +
      '<a href="Catalogo_Servicios_MDA_Capstone.html">Volver al Catálogo</a>');
    return;
  }
  if (!TARGET_SOP) return;

  setLoadingMsg('Cargando procedimiento ' + TARGET_SOP + '...');

  // Intentar desde KV (custom SOP) y si no existe, cargar el archivo estático
  function loadFromStatic() {
    var staticUrl = 'procedimientos/' + TARGET_SOP + '.html';
    setLoadingMsg('Cargando procedimiento...');
    fetch(staticUrl)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(html) {
        // Consultar KV por si hay una edición guardada del SOP estático
        var A = window.PlaybookAuth;
        if (A && A.workerUrl && A.session) {
          fetch(A.workerUrl + '/content/' + encodeURIComponent(TARGET_SOP), {
            headers: { 'Authorization': 'Bearer ' + A.session }
          })
          .then(function(r2) { return r2.json(); })
          .then(function(d) {
            injectSOP(html, d.hasEdit ? d.content : null);
          })
          .catch(function() { injectSOP(html, null); });
        } else {
          injectSOP(html, null);
        }
      })
      .catch(function() {
        showError('Procedimiento no encontrado',
          'El procedimiento <strong>' + TARGET_SOP + '</strong> no existe.<br><br>' +
          '<a href="Catalogo_Servicios_MDA_Capstone.html">← Ir al Catálogo</a>');
      });
  }

  fetch(A.workerUrl + '/sop/' + encodeURIComponent(TARGET_SOP), {
    headers: { 'Authorization': 'Bearer ' + (A.session || localStorage.getItem('mda_session') || '') }
  })
  .then(function(r) {
    if (r.status === 401) { window.location.href = 'login.html'; return null; }
    if (r.status === 404)  { loadFromStatic(); return null; }
    return r.json();
  })
  .then(function(data) {
    if (!data) return;
    if (data.error) { loadFromStatic(); return; }
    injectSOP(data.html, data.editedContent);
  })
  .catch(function() {
    // Cualquier error de red → intentar el archivo estático
    loadFromStatic();
  });
}

function injectSOP(html, editedContent) {
  // Parsear el HTML del SOP
  var parser  = new DOMParser();
  var sopDoc  = parser.parseFromString(html, 'text/html');

  // 1. Inyectar CSS del SOP en <head>
  sopDoc.querySelectorAll('style').forEach(function(s) {
    var st = document.createElement('style');
    st.textContent = s.textContent;
    document.head.appendChild(st);
  });

  // 2. Inyectar fonts del SOP
  sopDoc.querySelectorAll('link[rel="stylesheet"]').forEach(function(l) {
    if (!document.querySelector('link[href="' + l.href + '"]')) {
      document.head.appendChild(l.cloneNode(true));
    }
  });

  // 3. Actualizar título de la página
  if (sopDoc.title) document.title = sopDoc.title;

  // 4. Inyectar contenido del body (sin scripts para evitar doble carga)
  var container = document.getElementById('sop-content');
  var bodyHtml  = sopDoc.body.innerHTML
    // Eliminar referencias a los scripts de auth y playbook (ya cargados)
    .replace(/<script[^>]*auth-roles\.js[^>]*><\/script>/gi, '')
    .replace(/<script[^>]*playbook-core\.js[^>]*><\/script>/gi, '');
  container.innerHTML = bodyHtml;

  // 5. Ejecutar scripts inline del SOP (feedback, etc.) — de forma segura
  container.querySelectorAll('script:not([src])').forEach(function(orig) {
    var s = document.createElement('script');
    s.textContent = orig.textContent;
    document.body.appendChild(s);
  });

  // 6. Ocultar loading, mostrar contenido
  document.getElementById('viewer-loading').style.display = 'none';
  container.style.display = 'block';

  // 7. Aplicar contenido editado SÍNCRONAMENTE (viene en la misma respuesta del Worker)
  if (editedContent) {
    var c = document.querySelector('.container');
    if (c) {
      c.innerHTML = editedContent;
    }
  }

  // 8. Actualizar A.isSOP ahora que el contenido está inyectado
  var A = window.PlaybookAuth;
  if (A) {
    var sopEl = document.querySelector('.sop-id');
    var match = sopEl ? sopEl.textContent.match(/SOP-[A-Z]+-\d+/) : null;
    A.isSOP   = !!sopEl;
    A.sopId   = match ? match[0] : TARGET_SOP;
    A.sopTitle = document.title.replace(/SOP-[A-Z]+-\d+\s*[^\w]*/,'').trim();
    // Construir toolbar de admin usando la API pública (buildSOPToolbar está dentro del IIFE)
    if (A.isSOP && A.user && A.user.role === 'admin') {
      // Esperar un ciclo para que el DOM esté completamente listo
      setTimeout(function() {
        if (!document.getElementById('sop-admin-bar') && A.buildSOPToolbar) {
          A.buildSOPToolbar();
        }
        // También verificar si el contenido editado en KV existe
        if (A.sopId && A.workerUrl && A.authFetch) {
          A.authFetch(A.workerUrl + '/content/' + A.sopId)
            .then(function(r){ return r.json(); })
            .then(function(d){
              if (d.hasEdit) {
                var badge = document.getElementById('sab-edit-badge');
                if (badge) badge.style.display = 'inline-block';
              }
            }).catch(function(){});
        }
      }, 150);
    }
  }

  // 9. Cargar playbook-core.js UNA VEZ (glosario, contexto operacional, bot IA)
  if (!document.getElementById('playbook-core-loaded')) {
    var script   = document.createElement('script');
    script.id    = 'playbook-core-loaded';
    script.src   = 'js/playbook-core.js';
    script.onload = function() {
      if (window.PlaybookCoreInit) window.PlaybookCoreInit();
    };
    document.body.appendChild(script);
  }

  // 10. Indexar contenido del SOP en KV para búsqueda de texto completo
  (function indexSOPContent() {
    var auth = window.PlaybookAuth;
    if (!auth || !auth.workerUrl || !auth.authFetch || !TARGET_SOP) return;
    // Dar tiempo a que el contenido quede renderizado
    setTimeout(function() {
      var container = document.querySelector('#sop-content .container') ||
                      document.querySelector('.container');
      if (!container) return;
      var fullText = container.innerText || container.textContent || '';
      if (fullText.length < 100) return; // ignorar si el contenido es muy corto
      auth.authFetch(auth.workerUrl + '/proc/keywords', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ sopId: TARGET_SOP, fullText: fullText }),
      }).catch(function(){}); // silencioso — no crítico
    }, 1000);
  })();

  // 11. Sobrescribir submitFB para enviar feedback al Worker (no localStorage)
  (function patchFeedback() {
    var auth = window.PlaybookAuth;
    if (!auth || !auth.workerUrl || !auth.authFetch) return;

    window.submitFB = function() {
      var commentEl = document.getElementById('fb-text');
      var agentEl   = document.getElementById('fb-agent');
      var errorEl   = document.getElementById('fb-error');
      var comment   = commentEl ? commentEl.value.trim() : '';
      var agent     = agentEl   ? agentEl.value.trim()   : '';

      if (!comment) {
        if (errorEl) errorEl.style.display = 'block';
        return;
      }
      if (errorEl) errorEl.style.display = 'none';

      var sopEl = document.querySelector('.sop-id');
      var sopId = sopEl ? sopEl.textContent.trim().replace(/[^\w\-]/g,'').replace(/^[^S]*/,'') : TARGET_SOP;
      var titulo = (document.title || '').split('\u2014').slice(1).join('\u2014').trim() || document.title;

      auth.authFetch(auth.workerUrl + '/feedback', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ sop_id: sopId, titulo: titulo, agent: agent || 'Agente an\u00f3nimo', comment: comment }),
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.ok) throw new Error(d.error || 'Error');
        if (typeof window.closeFB === 'function') window.closeFB();
        if (commentEl) commentEl.value = '';
        var toast = document.getElementById('fb-toast');
        if (toast) {
          toast.style.opacity = '1';
          toast.style.transform = 'translateX(-50%) translateY(0)';
          setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(20px)';
          }, 3000);
        }
      })
      .catch(function(err) {
        if (errorEl) {
          errorEl.textContent = 'Error al enviar: ' + (err && err.message ? err.message : 'Sin conexi\u00f3n');
          errorEl.style.display = 'block';
        }
      });
    };
  })();
}

// Marcar que estamos en modo viewer (para que auth-roles.js lo detecte)
window._mdaViewerMode = true;

// ── Configurar el hook ANTES de que auth-roles.js cargue ─────────────────────
// Si auth-roles.js ya completó su auth, llamar directamente.
// Si no, registrar el callback para cuando termine.
(function hookAuth() {
  if (window.PlaybookAuth && window.PlaybookAuth.ready) {
    onAuthReady(window.PlaybookAuth.user);
  } else {
    // PlaybookAuth aún no existe o no está listo — registrar el hook
    var checkInterval = setInterval(function() {
      if (window.PlaybookAuth) {
        clearInterval(checkInterval);
        var prevOnReady = window.PlaybookAuth.onReady;
        window.PlaybookAuth.onReady = function(user) {
          if (prevOnReady) prevOnReady(user);
          onAuthReady(user);
        };
        // Si ya está ready cuando configuramos el hook
        if (window.PlaybookAuth.ready) onAuthReady(window.PlaybookAuth.user);
      }
    }, 50);
  }
})();
</script>

<!-- auth-roles.js carga UNA SOLA VEZ — proporciona nav bar + auth -->
<script src="js/auth-roles.js"></script>
<!-- playbook-core.js se carga dinámicamente DESPUÉS de inyectar el contenido -->

</body>
</html>

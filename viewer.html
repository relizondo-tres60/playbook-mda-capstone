<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Playbook MDA — Cargando procedimiento...</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f3f8;color:#1a1a2e}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#888}
.spinner{width:40px;height:40px;border:4px solid #eef1f7;border-top-color:#0057a8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{max-width:500px;margin:60px auto;background:#fff;border-radius:12px;padding:32px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.error-box h2{color:#c0392b;margin-bottom:10px}
.error-box p{color:#555;font-size:14px;line-height:1.6}
.error-box a{color:#0057a8;font-weight:600}
</style>
</head>
<body>

<div id="viewer-root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div>Cargando procedimiento...</div>
  </div>
</div>

<script>
// Leer el SOP ID de los parámetros de URL
var params = new URLSearchParams(window.location.search);
var sopId  = params.get('sop') || params.get('id') || '';

if (!sopId) {
  showError('SOP no especificado', 'No se indicó un ID de procedimiento en la URL. <a href="Catalogo_Servicios_MDA_Capstone.html">Ir al Catálogo</a>');
} else {
  // Obtener workerUrl del mismo lugar que auth-roles.js
  var WORKER_URL = localStorage.getItem('mda_worker_url') || '';

  // Intentar leer workerUrl del CFG si está disponible
  if (!WORKER_URL && window.CFG && CFG.workerUrl) WORKER_URL = CFG.workerUrl;

  if (!WORKER_URL) {
    showError('Worker no configurado', 'La URL del Worker no está configurada. <a href="Catalogo_Servicios_MDA_Capstone.html">Volver al Catálogo</a>');
  } else {
    loadSOP(sopId, WORKER_URL);
  }
}

function loadSOP(sopId, workerUrl) {
  var session = localStorage.getItem('mda_session') || '';
  fetch(workerUrl + '/sop/' + encodeURIComponent(sopId), {
    headers: { 'Authorization': 'Bearer ' + session }
  })
  .then(function(r) {
    if (r.status === 401) { window.location.href = 'login.html'; return null; }
    return r.json();
  })
  .then(function(data) {
    if (!data) return;
    if (data.error) { showError('Procedimiento no encontrado', 'El procedimiento <strong>' + sopId + '</strong> no existe o fue eliminado. <a href="Catalogo_Servicios_MDA_Capstone.html">Ir al Catálogo</a>'); return; }

    // Inyectar el HTML del SOP custom
    document.title = sopId + ' — Playbook MDA Capstone';

    // Crear un nuevo body con el HTML del SOP
    var parser  = new DOMParser();
    var doc     = parser.parseFromString(data.html, 'text/html');

    // Copiar estilos
    doc.querySelectorAll('style, link[rel="stylesheet"]').forEach(function(el) {
      document.head.appendChild(el.cloneNode(true));
    });

    // Reemplazar el contenido del body
    document.getElementById('viewer-root').innerHTML = '';
    doc.body.childNodes.forEach(function(node) {
      document.body.appendChild(document.adoptNode(node.cloneNode(true)));
    });

    // Ejecutar scripts inline del SOP (feedback JS, etc.)
    document.querySelectorAll('script:not([src])').forEach(function(script) {
      if (script.textContent.includes('submitFB') || script.textContent.includes('closeFB')) {
        var s = document.createElement('script');
        s.textContent = script.textContent;
        document.body.appendChild(s);
      }
    });

    // Cargar auth-roles y playbook-core si no están ya
    if (!document.getElementById('ar-css')) {
      loadScript('js/auth-roles.js');
    }
    loadScript('js/playbook-core.js');
  })
  .catch(function(e) {
    showError('Error al cargar', 'No se pudo obtener el procedimiento. Verifica tu conexión. <a href="Catalogo_Servicios_MDA_Capstone.html">Ir al Catálogo</a>');
  });
}

function loadScript(src) {
  var s = document.createElement('script');
  s.src = src;
  document.body.appendChild(s);
}

function showError(title, html) {
  document.getElementById('viewer-root').innerHTML =
    '<div class="error-box"><h2>' + title + '</h2><p>' + html + '</p></div>';
}
</script>
</body>
</html>

name = "mda-playbook"
main = "worker.js"
compatibility_date = "2024-09-23"

# KV Namespace — crear en Cloudflare Dashboard → KV → Create namespace "MDA_KV"
# Luego pegar el ID aquí
[[kv_namespaces]]
binding = "MDA_KV"
id      = "PEGA_EL_KV_ID_AQUI"

# Variables no sensibles (las sensibles van con: wrangler secret put NOMBRE)
[vars]
ADMIN_KEY = "Tres60admin"

# Variables sensibles — configurar en el Dashboard o con wrangler secret put:
#   GOOGLE_CLIENT_ID      → Client ID de Google Cloud Console
#   GOOGLE_CLIENT_SECRET  → Client Secret de Google Cloud Console
#   PAGES_URL             → URL de Cloudflare Pages
#   WORKER_URL            → URL de este Worker
#   BOOTSTRAP_EMAIL       → Tu correo (siempre tiene acceso)
#   ANTHROPIC_API_KEY     → API Key Anthropic (opcional, para bot IA)
